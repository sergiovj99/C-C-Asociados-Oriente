<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D0D0F" />
  <title>{% block title %}{{ empresa.nombre }} — Transporte y logística{% endblock %}</title>
  <meta name="description" content="{{ empresa.tagline }}. Operando desde {{ empresa.anio_fundacion }} en Colombia. Certificación CCS y RUC.">

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo.png') }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--
    Display: Archivo Black — condensed, industrial, heavy
    Body: Inter — clean operational
    Mono: JetBrains Mono — odometer / data
  -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  {% block content %}{% endblock %}

  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>
</html>
